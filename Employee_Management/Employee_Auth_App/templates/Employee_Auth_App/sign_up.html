{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block title %}
<title>Register</title>
{% endblock title %}

{% block css %}
<link rel="stylesheet" href="{% static 'Employee_App/css/add_emp.css' %}">
<link rel="stylesheet" href="{% static 'Employee_Auth_App/css/signup.css' %}">
{% endblock css %}

{% block content %}
<div class="container">
    <h1>Sign Up / Register</h1>
    <form method="post">
        {% csrf_token %}
        {{form | crispy}}
        <button type="submit" class="btn btn-light col-5">Sign Up</button>
        <a href="{% url 'SignIn' %}"><button type="button" class="btn btn-light col-5 float-end">Sign
                In</button></a>
    </form>
</div>
{% endblock %}
